<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>
</head>
<body>

<h3>Are you sure you want to delete this task?</h3>
<p><strong>{{ task.title }}</strong></p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>
<a href="{% url 'task_list' %}">Cancel</a>

</body>
</html>
